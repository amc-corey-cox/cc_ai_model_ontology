name: Validate Ontology

on:
  pull_request:
    paths:
      - 'schema/**'
      - 'data/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/validate-ontology.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Validate schema syntax
        run: |
          uv run gen-python schema/ccf_models.yaml > /dev/null
          echo "Schema syntax is valid"

      - name: Validate data files (LinkML)
        run: make validate

      - name: Validate provenance rules
        run: make validate-provenance

      - name: Validate internal cross-references
        run: uv run python scripts/validate_xrefs.py --internal

  validate-external:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Validate external URLs
        run: uv run python scripts/validate_xrefs.py --external
