# CC Forge Model Ontology - LinkML Schema
# https://linkml.io/

id: https://cc-forge.dev/ontology/models
name: ccf_models
title: CC Forge Model Ontology
description: >-
  Ontology for AI/ML models, their capabilities, and deployment constraints.
  Designed for local-first AI development.

license: Apache-2.0
version: 0.2.0

prefixes:
  linkml: https://w3id.org/linkml/
  ccf: https://cc-forge.dev/ontology/models/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  iao: http://purl.obolibrary.org/obo/IAO_
  obo: http://purl.obolibrary.org/obo/

default_prefix: ccf
default_range: string

imports:
  - linkml:types

# =============================================================================
# TYPES
# =============================================================================

types:
  ParameterCount:
    typeof: string
    description: Model parameter count (e.g., "7B", "70B", "671B")
    pattern: "^[0-9.]+(B|M|K)$"

  ContextLength:
    typeof: integer
    description: Maximum context length in tokens
    minimum_value: 1

# =============================================================================
# ENUMS
# =============================================================================

enums:
  LicenseType:
    description: Model license categories
    permissible_values:
      apache-2.0:
        description: Apache License 2.0
      mit:
        description: MIT License
      llama:
        description: Meta Llama Community License
      cc-by-nc-4.0:
        description: Creative Commons Non-Commercial
      proprietary:
        description: Proprietary license

  QuantizationType:
    description: GGUF quantization levels
    permissible_values:
      fp16:
        description: 16-bit floating point (full precision)
      q8_0:
        description: 8-bit quantization
      q6_k:
        description: 6-bit K-quant
      q5_k_m:
        description: 5-bit K-quant medium
      q4_k_m:
        description: 4-bit K-quant medium (recommended)
      q3_k_m:
        description: 3-bit K-quant medium
      q2_k:
        description: 2-bit K-quant (not recommended)

  TierType:
    description: CC Forge hardware deployment tiers
    permissible_values:
      tier1_gpu:
        description: Intel Arc GPU (~8GB VRAM)
      tier2_cpu:
        description: CPU with 64GB+ RAM
      tier3_api:
        description: External API

  ModelStatus:
    description: Model lifecycle status
    permissible_values:
      active:
        description: Currently recommended
      deprecated:
        description: Superseded by newer model
      experimental:
        description: Not yet validated

  CurationType:
    description: How data was gathered and curated
    permissible_values:
      human_curated:
        description: Manually researched and entered by a human
      ai_assisted:
        description: AI gathered data with human direction/review
      ai_generated:
        description: Fully AI-generated without human review
      automated:
        description: Programmatic extraction from APIs/registries

  VerifiedByType:
    description: What verified the data
    permissible_values:
      human:
        description: Verified by a human reviewer
      automated:
        description: Verified by automated validation
      unverified:
        description: Not yet verified

  SourceType:
    description: Type of information source
    permissible_values:
      model_card:
        description: Official model card (e.g., HuggingFace)
      paper:
        description: Published research paper
      official_announcement:
        description: Official blog post or announcement
      repository:
        description: Source code repository
      api_verified:
        description: Verified via API call
      community:
        description: Community-sourced information

# =============================================================================
# CLASSES
# =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Container Classes (for data file validation)
  # ---------------------------------------------------------------------------

  ModelDatabase:
    description: Container for Model instances
    tree_root: true
    attributes:
      models:
        range: Model
        multivalued: true
        inlined_as_list: true

  FamilyDatabase:
    description: Container for ModelFamily instances
    tree_root: true
    attributes:
      families:
        range: ModelFamily
        multivalued: true
        inlined_as_list: true

  CapabilityDatabase:
    description: Container for Capability instances
    tree_root: true
    attributes:
      capabilities:
        range: Capability
        multivalued: true
        inlined_as_list: true

  TierDatabase:
    description: Container for HardwareTier instances
    tree_root: true
    attributes:
      tiers:
        range: HardwareTier
        multivalued: true
        inlined_as_list: true

  # ---------------------------------------------------------------------------
  # Base Classes
  # ---------------------------------------------------------------------------

  NamedThing:
    description: Base class for all named entities
    abstract: true
    slots:
      - id
      - label
      - description
    class_uri: schema:Thing

  # ---------------------------------------------------------------------------
  # Provenance Classes
  # ---------------------------------------------------------------------------

  Source:
    description: A source of information for a data entry
    class_uri: ccf:Source
    attributes:
      source_type:
        range: SourceType
        required: true
        description: Type of source
      url:
        range: uri
        required: true
        description: URL of the source
      accessed:
        range: date
        required: true
        description: Date the source was accessed
      title:
        range: string
        description: Optional title of the source

  AIMetadata:
    description: Metadata about AI-assisted curation
    class_uri: ccf:AIMetadata
    attributes:
      model:
        range: string
        required: true
        description: AI model used (e.g., "claude-opus-4-6")
      generation_date:
        range: date
        required: true
        description: Date the AI generated the data
      confidence_notes:
        range: string
        description: Notes about AI confidence or uncertainty

  # ---------------------------------------------------------------------------
  # Model Family
  # ---------------------------------------------------------------------------

  ModelFamily:
    description: A lineage of related models from a single developer
    is_a: NamedThing
    class_uri: ccf:ModelFamily
    slots:
      - developed_by
      - homepage
      - xref_huggingface
      - xref_github
      - sources
      - curation_type
      - date_added
      - added_by
      - verified_by
      - verification_date
      - ai_metadata
    slot_usage:
      id:
        pattern: "^ccf:family:[a-z0-9-]+$"

  # ---------------------------------------------------------------------------
  # Capability
  # ---------------------------------------------------------------------------

  Capability:
    description: A capability that models can have
    is_a: NamedThing
    class_uri: ccf:Capability
    slots:
      - parent_capability
    slot_usage:
      id:
        pattern: "^ccf:capability:[a-z0-9-]+$"

  # ---------------------------------------------------------------------------
  # Hardware Tier
  # ---------------------------------------------------------------------------

  HardwareTier:
    description: A hardware deployment tier
    is_a: NamedThing
    class_uri: ccf:HardwareTier
    slots:
      - tier_type
      - max_model_size
      - speed_class
      - cc_forge_service
    slot_usage:
      id:
        pattern: "^ccf:tier:[a-z0-9-]+$"

  # ---------------------------------------------------------------------------
  # Model
  # ---------------------------------------------------------------------------

  Model:
    description: A specific AI/ML model variant
    is_a: NamedThing
    class_uri: ccf:Model
    slots:
      - member_of_family
      - derived_from
      - has_capability
      - parameter_count
      - context_length
      - fits_tier
      - recommended_quantization
      - license
      - status
      - xref_ollama
      - xref_huggingface
      - cc_forge_notes
      - sources
      - curation_type
      - date_added
      - added_by
      - verified_by
      - verification_date
      - ai_metadata
    slot_usage:
      id:
        pattern: "^ccf:model:[a-z0-9.-]+$"
      member_of_family:
        required: true
      sources:
        required: true
      curation_type:
        required: true
      date_added:
        required: true
      added_by:
        required: true

  # ---------------------------------------------------------------------------
  # Embedding Model (specialized)
  # ---------------------------------------------------------------------------

  EmbeddingModel:
    description: A model that produces vector embeddings
    is_a: Model
    class_uri: ccf:EmbeddingModel
    slots:
      - embedding_dimensions

# =============================================================================
# SLOTS
# =============================================================================

slots:

  # ---------------------------------------------------------------------------
  # Identity Slots
  # ---------------------------------------------------------------------------

  id:
    description: Unique identifier for this entity
    identifier: true
    range: uriorcurie
    required: true
    slot_uri: schema:identifier

  label:
    description: Human-readable name
    range: string
    required: true
    slot_uri: rdfs:label

  description:
    description: Longer description of the entity
    range: string
    slot_uri: dcterms:description

  # ---------------------------------------------------------------------------
  # Organization Slots
  # ---------------------------------------------------------------------------

  developed_by:
    description: Organization that developed this model/family
    range: string
    slot_uri: schema:creator

  homepage:
    description: Official homepage URL
    range: uri
    slot_uri: schema:url

  # ---------------------------------------------------------------------------
  # Relationship Slots
  # ---------------------------------------------------------------------------

  member_of_family:
    description: The model family this model belongs to
    range: ModelFamily
    slot_uri: ccf:memberOfFamily

  derived_from:
    description: Parent model this was derived/distilled from
    range: Model
    slot_uri: ccf:derivedFrom

  has_capability:
    description: Capabilities this model has
    range: Capability
    multivalued: true
    slot_uri: ccf:hasCapability

  parent_capability:
    description: Parent capability in hierarchy
    range: Capability
    slot_uri: ccf:parentCapability

  fits_tier:
    description: Hardware tiers this model can run on
    range: HardwareTier
    multivalued: true
    slot_uri: ccf:fitsTier

  # ---------------------------------------------------------------------------
  # Model Property Slots
  # ---------------------------------------------------------------------------

  parameter_count:
    description: Number of parameters (e.g., "7B", "70B")
    range: ParameterCount
    slot_uri: ccf:parameterCount

  context_length:
    description: Maximum context length in tokens
    range: ContextLength
    slot_uri: ccf:contextLength

  embedding_dimensions:
    description: Dimensionality of embedding vectors
    range: integer
    slot_uri: ccf:embeddingDimensions

  recommended_quantization:
    description: Recommended quantization for local use
    range: QuantizationType
    slot_uri: ccf:recommendedQuantization

  license:
    description: License type
    range: LicenseType
    slot_uri: dcterms:license

  status:
    description: Model lifecycle status
    range: ModelStatus
    slot_uri: ccf:status

  # ---------------------------------------------------------------------------
  # Tier Property Slots
  # ---------------------------------------------------------------------------

  tier_type:
    description: Type of hardware tier
    range: TierType
    slot_uri: ccf:tierType

  max_model_size:
    description: Maximum model size that fits
    range: string
    slot_uri: ccf:maxModelSize

  speed_class:
    description: Relative speed (fast, slow, variable)
    range: string
    slot_uri: ccf:speedClass

  cc_forge_service:
    description: CC Forge systemd service name
    range: string
    slot_uri: ccf:ccForgeService

  # ---------------------------------------------------------------------------
  # Cross-Reference Slots
  # ---------------------------------------------------------------------------

  xref_ollama:
    description: Ollama model tag
    range: string
    slot_uri: ccf:xrefOllama

  xref_huggingface:
    description: HuggingFace model/org ID
    range: string
    slot_uri: ccf:xrefHuggingface

  xref_github:
    description: GitHub repository
    range: string
    slot_uri: ccf:xrefGithub

  # ---------------------------------------------------------------------------
  # CC Forge Specific
  # ---------------------------------------------------------------------------

  cc_forge_notes:
    description: CC Forge-specific usage notes
    range: string
    slot_uri: ccf:ccForgeNotes

  # ---------------------------------------------------------------------------
  # Provenance Slots
  # ---------------------------------------------------------------------------

  sources:
    description: Sources of information for this entry
    range: Source
    multivalued: true
    inlined_as_list: true
    slot_uri: ccf:sources

  curation_type:
    description: How this data was gathered
    range: CurationType
    slot_uri: ccf:curationType

  date_added:
    description: Date this entry was created
    range: date
    slot_uri: ccf:dateAdded

  added_by:
    description: Who added this entry (human or agent identifier)
    range: string
    slot_uri: ccf:addedBy

  verified_by:
    description: What verified this entry
    range: VerifiedByType
    slot_uri: ccf:verifiedBy

  verification_date:
    description: Date this entry was verified
    range: date
    slot_uri: ccf:verificationDate

  ai_metadata:
    description: Metadata about AI-assisted curation
    range: AIMetadata
    inlined: true
    slot_uri: ccf:aiMetadata
